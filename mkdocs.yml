site_name: Приватный архив
site_description: Личные конспекты курса по продакт-менеджменту (модули 1 → 9.1)
site_author: Dan
site_url: https://themaddoxed.github.io/xbafcrxg-yvoenel/
docs_dir: docs
site_dir: build

# === Theme ===
theme:
  name: material
  language: ru
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Светлая тема
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Светлая тема
  features:
    # navigation.instant is intentionally OFF — it does in-place DOM swaps that
    # collide with staticrypt's document.write on navigation.
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - header.autohide
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
    - content.tabs.link
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

# === Plugins ===
# Search index IS generated — but our build pipeline encrypts it (see
# encrypt_search_index.js) and deletes the plaintext before publishing.
# A theme override (overrides/main.html) intercepts window.fetch to route
# search_index.json requests to search_index.enc and decrypt on the fly.
plugins:
  - search:
      lang:
        - ru
        - en
      separator: '[\s\u2014\-\.]+'

# === Markdown Extensions ===
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: "#"
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.smartsymbols

# === Stylesheets ===
extra_css:
  - stylesheets/extra.css

# === Extra ===
extra:
  generator: false

